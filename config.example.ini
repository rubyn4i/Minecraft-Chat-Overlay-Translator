# Minecraft Chat Overlay Translator configuration example
# You can point log.path to latest.log, the logs folder, or the Minecraft profile folder.

log.path=C:\Users\YourUser\AppData\Roaming\.minecraft\logs\latest.log

incoming.source.language=en
incoming.target.language=ru
outgoing.source.language=ru
outgoing.target.language=en

translator.provider=google_web
deepl.api.key=
deepl.api.url=https://api-free.deepl.com/v2/translate
libre.api.key=
libre.api.url=https://libretranslate.com/translate

outgoing.auto.send=true
history.enabled=true

window.x=80
window.y=80
window.width=620
window.height=460
